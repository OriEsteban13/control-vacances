services:
  - type: web
    name: control-vacances
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: changeme2026
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
